<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>NodeJS Test - Authentication</title>
</head>
<body>

    <main>
        <h1>Login</h1>
        <p id="err-paragraph"></p>
        <form id="login-form">
            <label for="login-username">Enter your username:</label>
            <input id="login-username" type="text" placeholder="E.g: Ben Dover" maxlength="20">
            <label for="login-password" >Enter your password</label>
            <input id="login-password" type="text" placeholder="Min. 8 characters" minlength="8" maxlength="25">
            <button id="login" type="button">Log in</button>
        </form>
        <form id="register-form">
            <label for="register-username">Create a username:</label>
            <input id="register-username" type="text" placeholder="E.g: Ben Dover" maxlength="20">
            <label for="register-password" >Create a strong password</label>
            <input id="register-password" type="text" placeholder="Min. 8 characters" minlength="8" maxlength="25">
            <button id="register" type="button">Register</button>
        </form>
        <p id="change-form">Don't have an account?</p>
    </main>
    <script src="./auth_script.js"></script>
</body>
</html>
